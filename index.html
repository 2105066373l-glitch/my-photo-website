<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建华的摄影作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            padding: 18px 0;
            text-align: center;
            z-index: 999;
        }

        nav a {
            color: white;
            margin: 0 16px;
            text-decoration: none;
            font-size: 15px;
        }

        nav a:hover {
            color: #ffd700;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://picsum.photos/1920/1080?random=1');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 20px;
            color: #ccc;
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .title {
            text-align: center;
            font-size: 32px;
            margin: 100px 0 40px;
        }

        .profile {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px;
            line-height: 1.9;
            font-size: 17px;
            color: #ddd;
        }

        /* 分类按钮样式 */
        .filter-btn {
            text-align: center;
            margin-bottom: 40px;
        }
        .filter-btn button {
            background: transparent;
            border: 1px solid #ffd700;
            color: #fff;
            padding: 10px 22px;
            margin: 0 8px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn button.active,
        .filter-btn button:hover {
            background: #ffd700;
            color: #000;
        }

        /* 作品网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
        }
        .gallery img:hover {
            transform: scale(1.04);
            opacity: 0.9;
        }
        /* 隐藏分类区块 */
        .work-item {
            display: none;
        }
        .work-item.show {
            display: block;
        }

        .contact {
            text-align: center;
            margin: 60px 0;
            color: #ccc;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #777;
            border-top: 1px solid #333;
        }
    </style>
</head>

<body>
    <nav>
        <a href="#home">首页</a>
        <a href="#about">关于我</a>
        <a href="#works">作品分类</a>
        <a href="#contact">联系我</a>
    </nav>

    <section class="hero" id="home">
        <h1>建华的摄影世界</h1>
        <p>用镜头记录生活，用光与影留下最美的瞬间</p>
    </section>

    <div class="container">
        <h2 class="title" id="about">关于我</h2>
        <div class="profile">
            <p>大家好，我是建华，一名热爱摄影的记录者。</p>
            <p>我喜欢用相机捕捉风景、人文、生活中的温暖与美好。</p>
            <p>摄影对我来说，不只是爱好，更是一种表达与看见世界的方式。</p>
            <p>希望我的作品，能让你感受到画面里的温度与故事。</p>
        </div>
    </div>

    <!-- 作品分类区域 -->
    <div class="container" id="works">
        <h2 class="title">摄影作品分类</h2>

        <!-- 切换按钮 -->
        <div class="filter-btn">
            <button class="active" data-filter="all">全部作品</button>
            <button data-filter="scenery">风景摄影</button>
            <button data-filter="portrait">人像摄影</button>
            <button data-filter="street">街头纪实</button> 
            <button data-filter="night">生态摄影</button>
        </div>

        <!-- 风景摄影 -->
        <div class="work-item scenery show">
            <div class="gallery">
                <img src="https://picsum.photos/800/600?random=10" alt="风景">
                <img src="https://picsum.photos/800/600?random=11" alt="风景">
                <img src="https://picsum.photos/800/600?random=12" alt="风景">
            </div>
        </div>

        <!-- 人像摄影 -->
        <div class="work-item portrait show">
            <div class="gallery">
                <img src="https://picsum.photos/800/600?random=20" alt="人像">
                <img src="https://picsum.photos/800/600?random=21" alt="人像">
                <img src="https://picsum.photos/800/600?random=22" alt="人像">
            </div>
        </div>

        <!-- 街头纪实 -->
        <div class="work-item street show">
            <div class="gallery">
                <img src="https://picsum.photos/800/600?random=30" alt="街头">
                <img src="https://picsum.photos/800/600?random=31" alt="街头">
                <img src="https://picsum.photos/800/600?random=32" alt="街头">
            </div>
        </div>

        <!-- 生态摄影 -->
        <div class="work-item night show">
            <div class="gallery">
                <img src="DSC00737.jpg" alt="生态">
                <img src="DSC00945.jpg" alt="生态">
            </div>
        </div>
    </div>

    <div class="contact" id="contact">
        <p>邮箱：your@email.com</p>
        <p>微信：jianhua-wechat</p>
    </div>

    <footer>
        © 2025 建华的摄影作品集 | 保留所有权利
    </footer>

    <!-- 交互脚本 -->
    <script>
        // 获取所有按钮和作品区块
        const btns = document.querySelectorAll('.filter-btn button');
        const items = document.querySelectorAll('.work-item');

        btns.forEach(btn => {
            btn.addEventListener('click', function () {
                // 切换按钮选中状态
                btns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                // 获取当前筛选分类
                const filter = this.getAttribute('data-filter');

                // 显示/隐藏对应作品
                items.forEach(item => {
                    if(filter === 'all'){
                        item.classList.add('show');
                    }else{
                        if(item.classList.contains(filter)){
                            item.classList.add('show');
                        }else{
                            item.classList.remove('show');
                        }
                    }
                })
            })
        })
    </script>
</body>
</html>
